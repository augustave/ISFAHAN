<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANI-A1 // HUD CAM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Layer 1: Thermal background -->
  <div id="thermal-bg"></div>

  <!-- Layer 2: SVG HUD -->
  <svg id="hud" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="glow-strong">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <filter id="thermal-noise" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="0" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay"/>
      </filter>
      <clipPath id="compass-clip">
        <rect x="560" y="30" width="800" height="50"/>
      </clipPath>
      <clipPath id="alt-clip"><rect x="100" y="300" width="120" height="460"/></clipPath>
      <clipPath id="spd-clip"><rect x="1700" y="300" width="120" height="460"/></clipPath>

      <!-- NVG binocular vignette softening -->
      <filter id="bino-soft"><feGaussianBlur stdDeviation="30"/></filter>

      <!-- Honeycomb fiber-optic faceplate pattern -->
      <pattern id="honeycomb" width="10" height="17.32" patternUnits="userSpaceOnUse">
        <circle cx="5" cy="4.33" r="4" fill="none" style="stroke: var(--hud-primary)" stroke-width="0.3"/>
        <circle cx="0" cy="12.99" r="4" fill="none" style="stroke: var(--hud-primary)" stroke-width="0.3"/>
        <circle cx="10" cy="12.99" r="4" fill="none" style="stroke: var(--hud-primary)" stroke-width="0.3"/>
      </pattern>

      <!-- NVG binocular figure-eight mask -->
      <mask id="bino-cutout">
        <rect width="1920" height="1080" fill="white"/>
        <g filter="url(#bino-soft)">
          <ellipse cx="700" cy="540" rx="520" ry="510" fill="black"/>
          <ellipse cx="1220" cy="540" rx="520" ry="510" fill="black"/>
        </g>
      </mask>
    </defs>

    <!-- Thermal noise grain layer -->
    <rect id="noise-layer" x="0" y="0" width="1920" height="1080" filter="url(#thermal-noise)" fill="transparent" opacity="0.12"/>

    <!-- Compass bar -->
    <g id="compass">
      <line x1="560" y1="60" x2="1360" y2="60" style="stroke: var(--hud-dim)" stroke-width="1"/>
      <polygon points="960,42 954,30 966,30" style="fill: var(--hud-primary)" filter="url(#glow)"/>
      <text x="960" y="24" class="hud-text hud-text--sm" text-anchor="middle">HDG</text>
      <g id="compass-ticks" clip-path="url(#compass-clip)"></g>
      <text id="heading-value" x="960" y="90" class="hud-text" text-anchor="middle" filter="url(#glow)">247°</text>
    </g>

    <!-- DRIP Remote ID (Enhanced) -->
    <g id="drip-id" transform="translate(1340, 100)">
      <rect x="0" y="0" width="520" height="155" fill="rgba(0,0,0,0.3)" style="stroke: var(--hud-deep)" stroke-width="1"/>
      <rect x="0" y="0" width="520" height="18" fill="rgba(0,0,0,0.2)"/>
      <text x="8" y="13" class="hud-text hud-text--xsm" style="fill: var(--hud-bright)">DRIP UAS RID</text>
      <text x="300" y="13" class="hud-text hud-text--xsm" id="obs-state" style="fill: var(--hud-primary)">● SCAN</text>
      <text x="510" y="13" class="hud-text hud-text--xsm" text-anchor="end" id="drip-auth">VRFD</text>
      <rect x="480" y="24" width="8" height="8" style="fill: var(--hud-primary)" class="blink"/>
      <text x="8" y="40" class="hud-text hud-text--dim">HHIT</text>
      <text x="65" y="40" class="hud-text hud-text--sm" id="drip-uas-id">0000:0000:0000:0000:0000:0000:0000:0000</text>
      <text x="8" y="62" class="hud-text hud-text--dim">DET</text>
      <text x="65" y="62" class="hud-text hud-text--sm" id="drip-session">0000:0000:0000:0000</text>
      <text x="8" y="84" class="hud-text hud-text--dim">OPR</text>
      <text x="65" y="84" class="hud-text hud-text--sm" id="drip-operator">FAA:UA-000000</text>
      <text x="8" y="106" class="hud-text hud-text--dim">RID</text>
      <text x="65" y="106" class="hud-text hud-text--sm" id="drip-rid-mode">BCAST</text>
      <text x="200" y="106" class="hud-text hud-text--dim">REG</text>
      <text x="250" y="106" class="hud-text hud-text--sm" style="fill: var(--hud-bright)">ASTM-F38</text>
      <text x="510" y="106" class="hud-text hud-text--xsm" text-anchor="end" style="fill: var(--hud-dim)">EdDSA</text>
      <!-- Auth page assembly progress -->
      <text x="8" y="130" class="hud-text hud-text--dim" style="font-size:11px">AUTH</text>
      <rect x="55" y="120" width="200" height="10" fill="none" style="stroke: var(--hud-deep)" stroke-width="1"/>
      <rect x="56" y="121" width="0" height="8" style="fill: var(--hud-dim)" id="auth-fill"/>
      <text x="265" y="130" class="hud-text hud-text--xsm" id="auth-pages">0/16 PG</text>
      <text x="370" y="130" class="hud-text hud-text--xsm" id="auth-sig" style="fill: var(--hud-dim)">AWAIT</text>
    </g>

    <!-- Trust chain -->
    <g id="trust-chain" transform="translate(1340, 265)">
      <text x="8" y="10" class="hud-text hud-text--xsm" style="fill: var(--hud-dim)">CERT CHAIN</text>
      <g id="trust-nodes" transform="translate(8, 18)"></g>
    </g>

    <!-- Encounter log -->
    <g id="encounter-log" transform="translate(1340, 365)">
      <text x="8" y="10" class="hud-text hud-text--xsm" style="fill: var(--hud-dim)">ENC LOG</text>
      <g id="enc-entries" transform="translate(8, 20)"></g>
    </g>

    <!-- Altitude tape (left) -->
    <g id="alt-tape">
      <rect x="100" y="300" width="120" height="460" fill="rgba(0,0,0,0.3)" style="stroke: var(--hud-deep)" stroke-width="1"/>
      <g id="alt-ticks" clip-path="url(#alt-clip)"></g>
      <rect x="100" y="525" width="120" height="30" class="tape-readout-box"/>
      <text id="alt-tape-readout" x="160" y="546" class="hud-text" text-anchor="middle" filter="url(#glow)">2847</text>
      <text x="160" y="290" class="hud-text hud-text--xsm" text-anchor="middle">ALT FT</text>
    </g>

    <!-- Airspeed tape (right) -->
    <g id="spd-tape">
      <rect x="1700" y="300" width="120" height="460" fill="rgba(0,0,0,0.3)" style="stroke: var(--hud-deep)" stroke-width="1"/>
      <g id="spd-ticks" clip-path="url(#spd-clip)"></g>
      <rect x="1700" y="525" width="120" height="30" class="tape-readout-box"/>
      <text id="spd-tape-readout" x="1760" y="546" class="hud-text" text-anchor="middle" filter="url(#glow)">124</text>
      <text x="1760" y="290" class="hud-text hud-text--xsm" text-anchor="middle">SPD KTS</text>
    </g>

    <!-- Phosphor persistence / track history trails -->
    <g id="track-trails" opacity="0.4" pointer-events="none"></g>

    <!-- Roll/bank horizon line -->
    <g id="horizon">
      <line x1="760" y1="540" x2="860" y2="540" style="stroke: var(--hud-primary)" stroke-width="1.5" opacity="0.6"/>
      <line x1="1060" y1="540" x2="1160" y2="540" style="stroke: var(--hud-primary)" stroke-width="1.5" opacity="0.6"/>
      <path d="M940,540 L950,546 L960,537 L970,546 L980,540" fill="none" style="stroke: var(--hud-primary)" stroke-width="2"/>
    </g>

    <!-- Reticle -->
    <g id="reticle" filter="url(#glow-strong)">
      <path d="M860,440 L860,420 L880,420" fill="none" style="stroke: var(--hud-primary)" stroke-width="2.5"/>
      <path d="M1060,440 L1060,420 L1040,420" fill="none" style="stroke: var(--hud-primary)" stroke-width="2.5"/>
      <path d="M860,640 L860,660 L880,660" fill="none" style="stroke: var(--hud-primary)" stroke-width="2.5"/>
      <path d="M1060,640 L1060,660 L1040,660" fill="none" style="stroke: var(--hud-primary)" stroke-width="2.5"/>
      <line x1="940" y1="420" x2="940" y2="445" style="stroke: var(--hud-primary)" stroke-width="1" opacity="0.6"/>
      <line x1="940" y1="635" x2="940" y2="660" style="stroke: var(--hud-primary)" stroke-width="1" opacity="0.6"/>
      <line x1="860" y1="540" x2="885" y2="540" style="stroke: var(--hud-primary)" stroke-width="1" opacity="0.6"/>
      <line x1="995" y1="540" x2="1060" y2="540" style="stroke: var(--hud-primary)" stroke-width="1" opacity="0.6"/>
      <circle cx="960" cy="540" r="2" style="fill: var(--hud-primary)" opacity="0.8"/>
      <path d="M920,500 L920,490 L930,490" fill="none" style="stroke: var(--hud-primary)" stroke-width="1.5" opacity="0.7"/>
      <path d="M1000,500 L1000,490 L990,490" fill="none" style="stroke: var(--hud-primary)" stroke-width="1.5" opacity="0.7"/>
      <path d="M920,580 L920,590 L930,590" fill="none" style="stroke: var(--hud-primary)" stroke-width="1.5" opacity="0.7"/>
      <path d="M1000,580 L1000,590 L990,590" fill="none" style="stroke: var(--hud-primary)" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- Target info labels -->
    <g id="target-info">
      <text x="870" y="410" class="hud-text hud-text--label">TGT LCK</text>
      <text x="1070" y="670" class="hud-text hud-text--label">HT SIG</text>
      <text id="lock-indicator" x="1070" y="690" class="hud-text hud-text--on">ON</text>
      <text id="tgt-range" x="1070" y="410" class="hud-text hud-text--label">RNG 1.24km</text>
    </g>

    <!-- RWR display (Enhanced with geofence + multi-drone) -->
    <g id="rwr" transform="translate(160, 780)">
      <!-- Geofence authorization zones -->
      <circle cx="0" cy="0" r="38" fill="none" stroke="#44cc44" stroke-width="0.6" stroke-dasharray="4,2" opacity="0.35"/>
      <circle cx="0" cy="0" r="28" fill="none" stroke="#ccaa33" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.3"/>
      <circle cx="0" cy="0" r="13" fill="none" stroke="#cc3333" stroke-width="0.8" opacity="0.4"/>
      <text x="42" y="-32" style="fill: #44cc44; font-family: 'Courier New', monospace; font-size: 6px; opacity: 0.5">AUTH</text>
      <text x="32" y="-20" style="fill: #ccaa33; font-family: 'Courier New', monospace; font-size: 6px; opacity: 0.5">RSTR</text>
      <text x="16" y="-6" style="fill: #cc3333; font-family: 'Courier New', monospace; font-size: 6px; opacity: 0.5">NFZ</text>

      <circle cx="0" cy="0" r="40" fill="rgba(0,0,0,0.3)" style="stroke: var(--hud-deep)" stroke-width="1"/>
      <line x1="0" y1="-40" x2="0" y2="40" style="stroke: var(--hud-subtle)" stroke-width="0.5"/>
      <line x1="-40" y1="0" x2="40" y2="0" style="stroke: var(--hud-subtle)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="20" fill="none" style="stroke: var(--hud-subtle)" stroke-width="0.5"/>
      <text x="0" y="-48" class="hud-text hud-text--xsm" text-anchor="middle">RWR</text>
      <g id="rwr-threats"></g>
      <!-- Multi-drone labeled blips -->
      <g id="rwr-drones"></g>
    </g>

    <!-- COMMLOG radio chatter -->
    <g id="commlog" transform="translate(280, 842)">
      <text x="0" y="-5" class="hud-text hud-text--xsm" style="fill: var(--hud-dim)">COMMLOG</text>
      <g id="commlog-lines" transform="translate(0, 8)"></g>
    </g>

    <!-- Status panel left -->
    <g id="status-left">
      <rect x="75" y="828" width="8" height="8" style="fill: var(--hud-primary)" class="blink"/>
      <text id="sensor-mode" x="92" y="836" class="hud-text hud-text--sm">FLIR 3.5x Z245 T12</text>
      <text x="80" y="870" class="hud-text hud-text--dim">SYS <tspan dx="20" id="sys-status">ENBL</tspan></text>
      <text x="80" y="895" class="hud-text hud-text--dim">TRK <tspan dx="20" id="trk-status">ENBL</tspan></text>
      <text x="80" y="920" class="hud-text hud-text--dim">WPN <tspan dx="20" id="wpn-status">2xHELLF</tspan></text>
      <text x="80" y="945" class="hud-text hud-text--dim">LNK <tspan dx="20" id="lnk-status">ACTV</tspan></text>
      <text x="80" y="970" class="hud-text hud-text--dim">FLT <tspan dx="20" id="flt-mode">AUTO</tspan></text>
    </g>

    <!-- Status panel right -->
    <g id="status-right">
      <text x="1740" y="880" class="hud-text hud-text--dim" text-anchor="end">ALT <tspan dx="10" id="alt-value">2,847</tspan> FT</text>
      <text x="1740" y="905" class="hud-text hud-text--dim" text-anchor="end">SPD <tspan dx="10" id="spd-value">124</tspan> KTS</text>
      <text x="1740" y="930" class="hud-text hud-text--dim" text-anchor="end">RNG <tspan dx="10" id="rng-value">8.4</tspan> NM</text>
      <text x="1740" y="955" class="hud-text hud-text--dim" text-anchor="end">PWR <tspan dx="10" id="pwr-value">94</tspan> %</text>
      <g id="pwr-bar" transform="translate(1830, 870)">
        <rect x="0" y="0" width="12" height="100" fill="none" style="stroke: var(--hud-deep)" stroke-width="1"/>
        <rect id="pwr-fill" x="1" y="6" width="10" height="94" style="fill: var(--hud-dim)"/>
      </g>
    </g>

    <!-- Telemetry bottom bar -->
    <g id="telemetry-bottom">
      <line x1="0" y1="1010" x2="1920" y2="1010" style="stroke: var(--hud-deep)" stroke-width="1"/>
      <text x="80" y="1040" class="hud-text hud-text--sm" id="gps-coords">34°12'18.4"N  118°14'32.1"W</text>
      <text x="960" y="1040" class="hud-text hud-text--sm" text-anchor="middle" id="utc-clock">05 APR 2026 19:42:07Z</text>
      <text x="1840" y="1040" class="hud-text hud-text--sm" text-anchor="end">ANI-A1 // CAM 01</text>
      <text x="1840" y="1060" class="hud-text hud-text--xsm" text-anchor="end" opacity="0.5">v2.4.1-RC</text>
    </g>

    <!-- Horizontal scan line -->
    <rect id="scan-line" x="0" y="0" width="1920" height="2" style="fill: var(--hud-bright)" opacity="0.3" filter="url(#glow)"/>

    <!-- Pitch ladder (simplified) -->
    <g id="pitch-ladder" opacity="0.3">
      <line x1="890" y1="480" x2="930" y2="480" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <line x1="990" y1="480" x2="1030" y2="480" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <text x="1035" y="484" class="hud-text hud-text--xsm">+5</text>
      <line x1="890" y1="600" x2="930" y2="600" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <line x1="990" y1="600" x2="1030" y2="600" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <text x="1035" y="604" class="hud-text hud-text--xsm">-5</text>
    </g>

    <!-- Border frame corners -->
    <g id="frame" opacity="0.4">
      <path d="M30,30 L30,80" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M30,30 L80,30" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M1890,30 L1890,80" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M1890,30 L1840,30" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M30,1050 L30,1000" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M30,1050 L80,1050" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M1890,1050 L1890,1000" style="stroke: var(--hud-primary)" stroke-width="1"/>
      <path d="M1890,1050 L1840,1050" style="stroke: var(--hud-primary)" stroke-width="1"/>
    </g>

    <!-- Classification banners (MIL-STD) -->
    <g id="class-banner" pointer-events="none">
      <rect x="0" y="0" width="1920" height="20" fill="rgba(0,0,0,0.5)"/>
      <text x="960" y="14" class="hud-text hud-text--xsm" text-anchor="middle" style="fill: var(--hud-bright); letter-spacing: 4px">TOP SECRET // NOFORN // REL TO USA, FVEY</text>
      <rect x="0" y="1060" width="1920" height="20" fill="rgba(0,0,0,0.5)"/>
      <text x="960" y="1074" class="hud-text hud-text--xsm" text-anchor="middle" style="fill: var(--hud-bright); letter-spacing: 4px">TOP SECRET // NOFORN // REL TO USA, FVEY</text>
    </g>

    <!-- AGC dimming overlay -->
    <rect id="agc-overlay" width="1920" height="1080" fill="black" opacity="0" pointer-events="none"/>

    <!-- Flash overlay (green-out / complementary) -->
    <rect id="flash-overlay" width="1920" height="1080" opacity="0" pointer-events="none"/>

    <!-- Binocular NVG vignette -->
    <rect id="bino-overlay" width="1920" height="1080" fill="black" mask="url(#bino-cutout)" opacity="0" pointer-events="none"/>

    <!-- Honeycomb fiber-optic pattern (NVG) -->
    <rect id="honeycomb-layer" width="1920" height="1080" fill="url(#honeycomb)" opacity="0" pointer-events="none"/>
  </svg>

  <!-- Layer 3: Scanlines overlay -->
  <div id="scanlines"></div>

  <script src="hud.js"></script>
</body>
</html>
